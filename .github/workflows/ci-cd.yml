name: CI/CD - OCMapas

on:
  push:
    branches:
      - develop
      - staging
      - main
  pull_request:
    branches:
      - develop
      - staging
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Testes e Validação
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ocmapas_test
          POSTGRES_USER: ocmapas
          POSTGRES_PASSWORD: test123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint --if-present || echo "Lint não configurado"

      - name: 🧪 Testes
        run: npm test --if-present || echo "Testes não configurados"
        env:
          DATABASE_URL: postgresql://ocmapas:test123@localhost:5432/ocmapas_test
          NODE_ENV: test

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔑 Login no Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Extrair metadados
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build e Push Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}-${{ github.sha }}

  deploy-staging:
    name: Deploy Staging
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🚀 Deploy em Staging
        run: |
          echo "Deployment em staging seria executado aqui"
          echo "Passo: ./scripts/deploy.sh staging staging"
        # Nota: Para deploy real, adicionar SSH key e executar script
        # - name: 🔑 Setup SSH
        #   uses: webfactory/ssh-agent@v0.7.0
        #   with:
        #     ssh-private-key: ${{ secrets.DEPLOY_KEY }}
        #
        # - name: 🚀 Execute Deploy
        #   run: ssh -o StrictHostKeyChecking=no user@staging-server 'cd /app && ./scripts/deploy.sh staging staging'

  deploy-production:
    name: Deploy Produção
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://ocmapas.example.com
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ⚠️ Requer Aprovação Manual
        run: |
          echo "Deploy de produção requer aprovação manual"
          echo "Revisar: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: 🚀 Deploy em Produção
        run: |
          echo "Deploy em produção seria executado aqui"
          echo "Passo: ./scripts/deploy.sh production main"
        # Nota: Para deploy real, adicionar SSH key e executar script
        # - name: 🔑 Setup SSH
        #   uses: webfactory/ssh-agent@v0.7.0
        #   with:
        #     ssh-private-key: ${{ secrets.DEPLOY_KEY }}
        #
        # - name: 📦 Backup Base de Dados
        #   run: ssh -o StrictHostKeyChecking=no user@production-server 'cd /app && ./scripts/deploy.sh production main'

  notify:
    name: Notificações
    if: always()
    runs-on: ubuntu-latest
    needs: [test, build]
    
    steps:
      - name: 📧 Status do Build
        run: |
          if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build bem-sucedido para ${{ github.ref_name }}"
          else
            echo "❌ Build falhou para ${{ github.ref_name }}"
          fi
